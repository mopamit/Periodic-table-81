<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>טבלה מחזורית אינטראקטיבית</title>
<style>
:root{--bg:#f7f7f7;--ink:#111;--muted:#666;--line:#111;--card:#fff;--shadow:0 10px 30px rgba(0,0,0,.12);--metal:#d9ecff;--nonmetal:#ffe2e7;--metalloid:#e8ffe0;--family:#fff1b8}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans Hebrew",sans-serif;background:var(--bg);color:var(--ink)}
.app{display:flex;flex-direction:row;min-height:100vh;direction:rtl}.side{width:220px;flex:0 0 220px;background:#fff;border-left:1px solid #ddd;padding:18px 14px;position:sticky;top:0;height:100vh;box-shadow:-4px 0 18px rgba(0,0,0,.05);direction:rtl}.main{flex:1;min-width:0;padding:18px 24px 40px;overflow:auto;direction:rtl}.title{text-align:center;font-size:46px;font-weight:900;margin:0 0 12px}.side h2{font-size:18px;margin:8px 0 16px}.btn{width:100%;border:1.5px solid #ddd;background:#fff;border-radius:14px;padding:16px 12px;margin:0 0 12px;box-shadow:0 4px 13px rgba(0,0,0,.08);cursor:pointer;font-size:17px;font-weight:700;text-align:center}.btn:hover{border-color:#111}.btn .num{font-size:30px;font-weight:900;display:block}.subpanel{display:none;padding:10px;border:1px solid #ddd;border-radius:14px;background:#fafafa;margin:-4px 0 12px}.subpanel.show{display:block}.choice{display:block;width:100%;margin:7px 0;padding:10px;border:1px solid #bbb;background:#fff;border-radius:10px;cursor:pointer;font-weight:700}.reset{margin-top:16px}.legend{margin-top:30px;border:1px solid #ddd;border-radius:14px;padding:12px;background:#fff}.legend div{display:flex;align-items:center;gap:8px;margin:8px 0}.sw{width:22px;height:22px;border:1px solid #111;background:white}.sw.metal{background:var(--metal)}.sw.nonmetal{background:var(--nonmetal)}.sw.metalloid{background:var(--metalloid)}.sw.family{background:var(--family)}
.tableWrap{min-width:1220px;margin:auto}.groupNums{display:grid;grid-template-columns:repeat(18,64px);gap:4px;margin:0 auto 6px;width:max-content;direction:ltr}.gnum{text-align:center;font-weight:800;font-size:18px}.ptable{display:grid;grid-template-columns:repeat(18,64px);grid-template-rows:repeat(7,64px);gap:4px;width:max-content;margin:auto;direction:ltr}.el{background:#fff;border:1.6px solid #111;border-radius:5px;position:relative;padding:4px;text-align:center;cursor:pointer;transition:.18s;overflow:hidden}.el:hover{transform:translateY(-2px);box-shadow:0 7px 14px rgba(0,0,0,.15)}.el .z{position:absolute;top:3px;left:5px;font-size:12px}.el .sym{font-size:22px;font-weight:900;line-height:1;margin-top:14px}.el .name{font-size:12px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.el .mass{font-size:10px;color:#333}.placeholder{background:#fff;border:1.6px dashed #111;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;cursor:pointer}.lanact{display:grid;grid-template-columns:110px repeat(15,64px);gap:4px;width:max-content;margin:26px auto 0;direction:ltr}.seriesLabel{display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;direction:rtl}.highlightMetal .el.metal{background:var(--metal)}.highlightNonmetal .el.nonmetal{background:var(--nonmetal)}.highlightMetalloid .el.metalloid{background:var(--metalloid)}.highlightFamily .el.selectedFamily{background:var(--family);border-width:2.5px}.dim .el:not(.active){opacity:.28}.el.active{opacity:1;box-shadow:0 0 0 3px rgba(0,0,0,.18)}
.infoBox{max-width:720px;margin:18px auto 0;background:#fff;border:1px solid #ddd;border-radius:16px;box-shadow:var(--shadow);padding:16px;display:none;direction:rtl}.infoBox.show{display:block}.infoBox h3{margin:0 0 8px;font-size:24px}.infoBox p{font-size:17px;line-height:1.45;margin:6px 0}.orderMode .ptable{display:flex;flex-wrap:wrap;max-width:1220px;gap:4px}.orderMode .el{width:64px;height:64px}.orderMode .groupNums,.orderMode .lanact,.orderMode .placeholder{display:none}.orderNote{text-align:center;font-weight:800;margin:8px 0 14px;display:none}.orderMode .orderNote{display:block}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:10;padding:20px}.modal.show{display:flex}.elementCard{width:min(820px,94vw);background:linear-gradient(180deg,#f9fbfd,#eef3f8);border:3px solid #c5ced8;border-radius:34px;box-shadow:0 24px 70px rgba(0,0,0,.35), inset 0 0 0 7px #f4f7fa;direction:rtl;padding:36px 42px 32px;position:relative;color:#102039}.elementCard:before{content:"";position:absolute;inset:12px;border:2px solid #d8e0e8;border-radius:26px;pointer-events:none}.close{position:absolute;left:24px;top:20px;border:0;background:transparent;font-size:36px;font-weight:900;cursor:pointer;color:#111;z-index:2}.heroCard{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.cardZ{grid-area:z;font-size:70px;font-weight:950;text-align:left;direction:ltr;line-height:1}.cardHeb{font-size:60px;font-weight:950;text-align:center;line-height:1;width:100%;margin-bottom:8px}.cardSym{font-size:160px;font-weight:950;line-height:.9;text-align:center;direction:ltr;margin:12px 0 0;color:#0e1b31}.cardEn{grid-area:en;font-size:38px;color:#52647a;text-align:center;direction:ltr;margin-top:8px}.facts{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:28px}.fact{background:rgba(255,255,255,.78);border:1.5px solid #cbd5df;border-radius:18px;padding:16px 18px;min-height:92px;box-shadow:0 4px 10px rgba(0,0,0,.04), inset 0 0 0 1px #eef2f5;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}.fact b{display:block;color:#4a5d73;font-size:20px;margin-bottom:6px}.fact span{font-size:30px;font-weight:900}.factIcon{font-size:42px;opacity:.72;line-height:1}.wide{grid-column:1/-1}.wide.fact{display:block}.small{font-size:21px!important;line-height:1.45;font-weight:800!important;color:#111}.cardTextBlock{text-align:right}.atomicStep{animation:pulse .45s ease}@keyframes pulse{50%{background:#111;color:#fff;transform:scale(1.08)}}

/* Logo */
.logo{text-align:center;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid #ddd}
.logo img{width:190px;max-width:100%;height:auto;display:block;margin:0 auto}

@media(max-width:900px){.app{display:block}.side{position:static;height:auto}.title{font-size:32px}.main{padding:12px;}.tableWrap{transform:scale(.72);transform-origin:top right;height:760px}.facts{grid-template-columns:1fr}.cardSym{font-size:110px}.cardHeb{font-size:42px}.cardZ{font-size:42px}}
</style>
</head>

<div class="app">
<aside class="side">
<div class="logo">
    <img src="assets/logo.png" alt="לוגו אמית">
</div>
  <button class="btn reset" onclick="resetAll()">↻ איפוס<br><small>חזרה לטבלה הרגילה</small></button>

</aside>
<main class="main">
 <h1 class="title">טבלה מחזורית של היסודות</h1>
 <div id="tableWrap" class="tableWrap">
  <div class="groupNums" id="groups"></div>
  <div class="orderNote">הטבלה מוצגת כעת ברצף לפי מספר אטומי עולה. לחיצה על איפוס או על בחירה אחרת תחזיר לטבלה הרגילה.</div>
  <div class="ptable" id="ptable"></div>
  <div class="lanact" id="series"></div>
 </div>
 <div class="infoBox" id="infoBox"></div>
</main>
</div>

const ptable=document.getElementById('ptable'), groups=document.getElementById('groups'), series=document.getElementById('series'), wrap=document.getElementById('tableWrap'), infoBox=document.getElementById('infoBox');
function init(){groups.innerHTML='';for(let i=1;i<=18;i++){let d=document.createElement('div');d.className='gnum';d.textContent=i;groups.appendChild(d)}; const fp=document.getElementById('familyPanel'); families.forEach(f=>{let b=document.createElement('button');b.className='choice';b.textContent=f[1];b.onclick=()=>highlightFamily(f[0],f[1]);fp.appendChild(b)}); renderNormal();}
function elDiv(e){let d=document.createElement('div');d.className=`el ${e.type} fam-${e.family}`;d.dataset.z=e.z;d.onclick=()=>openCard(e);d.innerHTML=`<div class="z">${e.z}</div><div class="sym">${e.sym}</div><div class="name">${e.he}</div>`;return d}
function renderNormal(){wrap.classList.remove('orderMode','highlightMetal','highlightNonmetal','highlightMetalloid','highlightFamily','dim');ptable.innerHTML='';series.innerHTML=''; E.filter(e=>e.period<=7 && e.z!==57 && e.z!==89).forEach(e=>{let d=elDiv(e);d.style.gridColumn=e.group;d.style.gridRow=e.period;ptable.appendChild(d)}); addPlaceholder('57–71',3,6); addPlaceholder('89–103',3,7); series.appendChild(label('לנתנידים →')); E.filter(e=>e.period==8).forEach(e=>series.appendChild(elDiv(e))); series.appendChild(label('אקטינידים →')); E.filter(e=>e.period==9).forEach(e=>series.appendChild(elDiv(e)));}
function addPlaceholder(txt,c,r){let d=document.createElement('div');d.className='placeholder';d.style.gridColumn=c;d.style.gridRow=r;d.textContent=txt;d.onclick=()=>showInfo(txt.includes('57')?'לנתנידים':'אקטינידים', txt.includes('57')?familyInfo.lanthanide:familyInfo.actinide);ptable.appendChild(d)}
function label(t){let d=document.createElement('div');d.className='seriesLabel';d.textContent=t;return d}
function togglePanel(id){document.getElementById(id).classList.toggle('show')}
function clearHighlights(){document.querySelectorAll('.el').forEach(x=>x.classList.remove('active','selectedFamily','atomicStep'));wrap.classList.remove('highlightMetal','highlightNonmetal','highlightMetalloid','highlightFamily','dim')}
function resetAll(){infoBox.classList.remove('show');renderNormal()}
function showAtomicOrder(){infoBox.classList.remove('show');wrap.classList.add('orderMode');ptable.innerHTML='';series.innerHTML=''; E.sort((a,b)=>a.z-b.z).forEach(e=>ptable.appendChild(elDiv(e))); let i=0; const nodes=[...document.querySelectorAll('.el')]; const timer=setInterval(()=>{if(i>0)nodes[i-1].classList.remove('atomicStep'); if(i>=nodes.length){clearInterval(timer);return} nodes[i].classList.add('atomicStep'); i++;},35)}
function highlightType(t){renderNormal();wrap.classList.add('dim',t==='metal'?'highlightMetal':t==='nonmetal'?'highlightNonmetal':'highlightMetalloid');document.querySelectorAll(`.el.${t}`).forEach(x=>x.classList.add('active'));showInfo(typeHe[t],typeInfo[t])}
function highlightFamily(f,name){renderNormal();wrap.classList.add('dim','highlightFamily');document.querySelectorAll(`.fam-${f}`).forEach(x=>{x.classList.add('selectedFamily','active')});showInfo(name,familyInfo[f]||'משפחה כימית בעלת תכונות דומות.')}
function showInfo(title,txt){infoBox.innerHTML=`<h3>${title}</h3><p>${txt}</p>`;infoBox.classList.add('show')}
function openCard(e){
 const card=document.getElementById('elementCard');
 const icons={metal:'▰',nonmetal:'○',metalloid:'◩'};
 const stateIcon={solid:'⬡',gas:'○',liquid:'◔'};
 card.innerHTML=`<button class="close" onclick="closeCard()">×</button>
 <div class="heroCard">
   <div class="cardHeb">${e.he}</div>
   <div class="cardSym">${e.sym}</div>
   <div class="cardEn">${e.en}</div>
 </div>
 <div class="facts">
   <div class="fact"><div class="cardTextBlock"><b>סוג</b><span>${typeHe[e.type]}</span></div><div class="factIcon">${icons[e.type]||'□'}</div></div>
   <div class="fact"><div class="cardTextBlock"><b>מספר אטומי</b><span>${e.z}</span></div><div class="factIcon">⚛</div></div>
   <div class="fact"><div class="cardTextBlock"><b>מצב צבירה</b><span>${stateHe[e.state]}</span></div><div class="factIcon">${stateIcon[e.state]||'□'}</div></div>
   <div class="fact"><div class="cardTextBlock"><b>משפחה כימית</b><span>${familyName(e.family)}</span></div><div class="factIcon">●●●</div></div>
   <div class="fact"><div class="cardTextBlock"><b>מסה אטומית</b><span>${e.mass}</span></div><div class="factIcon">⚖</div></div>
   <div class="fact"><div class="cardTextBlock"><b>שימושים נפוצים</b><span class="small">${e.use}</span></div><div class="factIcon">⌬</div></div>
   
 </div>`;
 document.getElementById('modal').classList.add('show')
}
function familyName(f){return (families.find(x=>x[0]===f)||[null,{post:'מתכות אחרות',nonmetal:'אל מתכות'}[f]||f])[1]}
function closeCard(){document.getElementById('modal').classList.remove('show')}
init();
</script>
